<app-header [titulo]="'Options'"></app-header> 
<button [routerLink]="'/add-subject'" class="add-button">Add Subject</button>
@for (subject of subjects; track subject.name)
{
    <div class="subject-post">
        <p>Subject: {{subject.name}}</p>
        <p>Credits: {{subject.credits}}</p>
        <button (click)="deleteSubject(subject.name)">Delete</button>
    </div>
}
