services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angular-app
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - api
    environment:
      API_URL: ${API_URL}

  api:
    image: node:18-alpine
    container_name: mock-api
    working_dir: /app
    environment:
      JSON_SERVER_WATCH: ${JSON_SERVER_WATCH}
    command: >
      sh -c "npm install -g json-server &&
      json-server --host 0.0.0.0 --port 3000 /app/db.json"
    ports:
      - "${API_PORT}:3000"
    volumes:
      - ./mock-api/db.json:/app/db.json
