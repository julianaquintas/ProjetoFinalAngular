name: CI + Vercel Deployment

# Dispara apenas quando houver merge/push para a branch dev
on:
  push:
    branches:
      - dev
      - feature/ci-pipeline

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Instalar dependências
        run: npm ci

      - name: Generate environments
        run: |
          mkdir -p src/environments

          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: false,
            apiUrl: "http://localhost:3001",
            supabaseUrl: "$SUPABASE_URL",
            supabaseKey: "$SUPABASE_ANON_KEY"
          };
          EOF

          cat > src/environments/environment.development.ts <<EOF
          export const environment = {
            production: false,
            apiUrl: "http://localhost:3001",
            supabaseUrl: "$SUPABASE_URL",
            supabaseKey: "$SUPABASE_ANON_KEY"
          };
          EOF

          cat > src/environments/environment.production.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: "http://localhost:3001",
            supabaseUrl: "$SUPABASE_URL",
            supabaseKey: "$SUPABASE_ANON_KEY"
          };
          EOF

      - name: Executar lint
        run: npm run lint

      - name: Executar build
        run: npm run build

      # Guarda os artefactos do Angular build para o deploy
      - name: Upload dist folder
        uses: actions/upload-artifact@v3
        with:
          name: angular-dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      # Baixa os artefactos buildados
      - name: Download dist folder
        uses: actions/download-artifact@v3
        with:
          name: angular-dist
          path: dist/

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
